<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rate Service – Xsome Complaint System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <div class="container">
            <a href="{{ url_for('home') }}" class="logo"><i class="fa-solid fa-building-shield"></i> Xsome Complaint
                System</a>
            <div class="nav-links">
                <a href="{{ url_for('user_dashboard') }}"><i class="fa-solid fa-arrow-left"></i> <span>My
                        Dashboard</span></a>
            </div>
        </div>
    </nav>

    <div class="container animate-up"
        style="padding:3rem 0; display:flex; align-items:center; justify-content:center; min-height:80vh;">
        <div style="width:100%; max-width:580px;">
            <div class="auth-card">
                <!-- Icon -->
                <div style="text-align:center; margin-bottom:2rem;">
                    <div
                        style="display:inline-flex; width:72px; height:72px; align-items:center; justify-content:center; background:rgba(245,158,11,0.1); border:1px solid rgba(245,158,11,0.2); border-radius:1.5rem; font-size:2rem; margin-bottom:1.25rem;">
                        <i class="fa-solid fa-star" style="color:#f59e0b;"></i>
                    </div>
                    <h1 style="font-size:1.8rem; font-weight:900; letter-spacing:-0.04em;">Rate Our Service</h1>
                    <p style="color:var(--text-muted); margin-top:0.4rem;">Complaint #{{ complaint.id }}: <strong>{{
                            complaint.title }}</strong></p>
                </div>

                <!-- Resolved badge -->
                <div
                    style="background:rgba(34,197,94,0.08); border:1px solid rgba(34,197,94,0.2); border-radius:var(--radius-sm); padding:0.75rem 1rem; margin-bottom:2rem; text-align:center;">
                    <span class="badge badge-success"><i class="fa-solid fa-circle-check"></i> Resolved by {{
                        complaint.category }} Department</span>
                </div>

                <form method="POST" action="{{ url_for('submit_feedback', complaint_id=complaint.id) }}">
                    <!-- Star Rating -->
                    <div class="form-group" style="text-align:center;">
                        <label class="form-label" style="display:block; margin-bottom:1rem;">How satisfied are you with
                            the resolution?</label>
                        <div id="starContainer"
                            style="display:flex; justify-content:center; gap:0.75rem; font-size:2.5rem; cursor:pointer;">
                            <i class="fa-regular fa-star" data-val="1" id="star-1" onclick="setRating(1)"></i>
                            <i class="fa-regular fa-star" data-val="2" id="star-2" onclick="setRating(2)"></i>
                            <i class="fa-regular fa-star" data-val="3" id="star-3" onclick="setRating(3)"></i>
                            <i class="fa-regular fa-star" data-val="4" id="star-4" onclick="setRating(4)"></i>
                            <i class="fa-regular fa-star" data-val="5" id="star-5" onclick="setRating(5)"></i>
                        </div>
                        <input type="hidden" id="rating" name="rating" value="0" required>
                        <div id="ratingText" style="color:var(--text-muted); margin-top:0.75rem; font-size:0.9rem;">
                            Click to rate</div>
                    </div>

                    <div class="form-group" style="margin-top:1.5rem;">
                        <label class="form-label" for="feedback"><i class="fa-solid fa-comment"></i> Your Feedback
                            (Optional)</label>
                        <textarea class="form-control" id="feedback" name="feedback" rows="4"
                            placeholder="Tell us about your experience with the resolution..."></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary w-full"
                        style="padding:0.9rem; font-size:1rem; margin-top:0.5rem;" id="submitBtn" disabled>
                        <i class="fa-solid fa-paper-plane"></i> Submit Feedback
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        let currentRating = 0;
        const ratingLabels = { 1: 'Very Dissatisfied 😞', 2: 'Dissatisfied 😕', 3: 'Neutral 😐', 4: 'Satisfied 😊', 5: 'Very Satisfied ⭐' };
        function setRating(val) {
            currentRating = val;
            document.getElementById('rating').value = val;
            document.getElementById('ratingText').textContent = ratingLabels[val];
            document.getElementById('submitBtn').disabled = false;
            for (let i = 1; i <= 5; i++) {
                const star = document.getElementById(`star-${i}`);
                if (i <= val) {
                    star.className = 'fa-solid fa-star';
                    star.style.color = '#f59e0b';
                } else {
                    star.className = 'fa-regular fa-star';
                    star.style.color = '';
                }
            }
        }
        // Hover effects
        for (let i = 1; i <= 5; i++) {
            const star = document.getElementById(`star-${i}`);
            star.addEventListener('mouseenter', () => {
                for (let j = 1; j <= 5; j++) {
                    const s = document.getElementById(`star-${j}`);
                    s.style.color = j <= i ? '#f59e0b' : '';
                    s.className = j <= i ? 'fa-solid fa-star' : 'fa-regular fa-star';
                }
            });
            star.addEventListener('mouseleave', () => {
                for (let j = 1; j <= 5; j++) {
                    const s = document.getElementById(`star-${j}`);
                    if (j <= currentRating) { s.className = 'fa-solid fa-star'; s.style.color = '#f59e0b'; }
                    else { s.className = 'fa-regular fa-star'; s.style.color = ''; }
                }
            });
        }
    </script>
</body>

</html>
